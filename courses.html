<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Courses</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .course-card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }

    .course-card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .course-title {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .course-desc {
      font-size: 14px;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body>

<header>📚 Courses</header>

<div class="container">
  <a href="vibe-coding-course.html" class="course-card">
    <div class="course-title">🚀 Vibe Coding Course</div>
    <div class="course-desc">Learn coding with style and build real projects</div>
  </a>
</div>

<footer>Made by NDA Team and Usairim Kamal</footer>

</body>
</html>
